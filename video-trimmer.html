        <div class="headline-bar">

        <p class="subtitle">Choose trim points and export only the section you need.</p>

        <section class="card">

            </div>

            <div id="trimPreviewWrap" class="audio-preview" style="margin-top:12px;">
                <div class="trim-live-layout">
                    <div class="trim-live-left">
                        <section id="studioAdjustPanel" class="studio-panel is-open">
                            <button id="studioAdjustToggle" type="button" class="studio-toggle" aria-expanded="true" aria-controls="studioAdjustContent">Adjust Video</button>
                            <div id="studioAdjustContent" class="studio-content">
                                <h4 class="studio-subtitle">Color Correction</h4>
                                <div class="studio-slider-list">
                                    <div class="studio-slider-row"><label for="adjBrightness">Brightness</label><input id="adjBrightness" type="range" min="-100" max="100" step="1" value="0"><output id="adjBrightnessVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjContrast">Contrast</label><input id="adjContrast" type="range" min="-100" max="100" step="1" value="0"><output id="adjContrastVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjExposure">Exposure</label><input id="adjExposure" type="range" min="-100" max="100" step="1" value="0"><output id="adjExposureVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjHue">Hue</label><input id="adjHue" type="range" min="-180" max="180" step="1" value="0"><output id="adjHueVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjSaturation">Saturation</label><input id="adjSaturation" type="range" min="-100" max="100" step="1" value="0"><output id="adjSaturationVal">0</output></div>
                                </div>
                                <h4 class="studio-subtitle">Effects</h4>
                                <div class="studio-slider-list">
                                    <div class="studio-slider-row"><label for="adjSharpen">Sharpen</label><input id="adjSharpen" type="range" min="0" max="100" step="1" value="0"><output id="adjSharpenVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjNoise">Noise</label><input id="adjNoise" type="range" min="0" max="100" step="1" value="0"><output id="adjNoiseVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjBlur">Blur</label><input id="adjBlur" type="range" min="0" max="100" step="1" value="0"><output id="adjBlurVal">0</output></div>
                                    <div class="studio-slider-row"><label for="adjVignette">Vignette</label><input id="adjVignette" type="range" min="0" max="100" step="1" value="0"><output id="adjVignetteVal">0</output></div>
                                </div>
                            </div>
                        </section>

                    </div>

                    <div class="trim-live-right">
                        <h3 class="preview-title">Source Preview</h3>
                        <div class="trim-video-shell">
                            <video id="trimPreview" class="tool-video-preview" controls></video>
                            <div id="trimVignetteOverlay" class="trim-video-layer trim-vignette-overlay"></div>
                            <div id="trimNoiseOverlay" class="trim-video-layer trim-noise-overlay"></div>
                        </div>
                        <div class="preview-controls trim-preview-controls">
                            <button id="trimPlayBtn" type="button" class="preview-btn" aria-label="Play preview">Play</button>
                            <input id="trimSeek" class="preview-seek" type="range" min="0" max="100" step="0.01" value="0" aria-label="Seek preview">
                            <span id="trimTime" class="preview-time">0:00 / 0:00</span>
                        </div>

                        <div class="trim-timeline-shell">
                            <span id="trimStartPill" class="trim-start-pill">00:00.0</span>
                            <div id="trimTrack" class="trim-track">
                                <canvas id="trimThumbs" class="trim-thumbs" width="900" height="56" aria-label="Video thumbnail timeline"></canvas>
                                <div id="trimMaskLeft" class="trim-mask left"></div>
                                <div id="trimMaskRight" class="trim-mask right"></div>
                                <div id="trimSelection" class="trim-selection"></div>
                                <button id="trimHandleStart" type="button" class="trim-handle" aria-label="Trim start handle" title="Start handle: use A and D keys"></button>
                                <button id="trimHandleEnd" type="button" class="trim-handle" aria-label="Trim end handle" title="End handle: use W and S keys"></button>
                            </div>
                            <div class="trim-labels">
                                <span id="trimLabelStart">00:00.0</span>
                                <span id="trimLabelDuration" class="mid">Selected: 00:00.0</span>
                                <span id="trimLabelEnd">00:00.0</span>
                            </div>
                        </div>

                        <div class="convert-grid fixed-two-col" style="margin-top:12px;">
                            <div>
                                <label for="trimStart">Start Time (MM:SS or HH:MM:SS)</label>
                                <input id="trimStart" type="text" placeholder="00:00" value="00:00">
                            </div>
                            <div>
                                <label for="trimEnd">End Time (MM:SS or HH:MM:SS)</label>
                                <input id="trimEnd" type="text" placeholder="00:30" value="00:30">
                            </div>
                        </div>

                        <div class="trim-option-bars">
                            <div class="trim-option-row trim-mode-row" role="radiogroup" aria-label="Trim mode">
                                <label class="trim-toggle" for="trimModeDelete">
                                    <input id="trimModeDelete" name="trimMode" type="radio" value="delete">
                                    <span>Delete Selected</span>
                                </label>
                                <label class="trim-toggle" for="trimModeExtract">
                                    <input id="trimModeExtract" name="trimMode" type="radio" value="extract" checked>
                                    <span>Extract Selected</span>
                                </label>
                            </div>
                            <div class="trim-option-row">
                                <label class="trim-toggle" for="trimFadeIn">
                                    <input id="trimFadeIn" type="checkbox">
                                    <span>Fade in</span>
                                </label>
                                <label class="trim-toggle" for="trimFadeOut">
                                    <input id="trimFadeOut" type="checkbox">
                                    <span>Fade out</span>
                                </label>
                            </div>
                        </div>

                        <section id="studioAnimPanel" class="studio-panel" style="margin-top:12px;">
                            <button id="studioAnimToggle" type="button" class="studio-toggle" aria-expanded="false" aria-controls="studioAnimContent">Animations</button>
                            <div id="studioAnimContent" class="studio-content">
                                <div class="anim-tabs">
                                    <button type="button" class="anim-tab is-active" data-anim-tab="in">In</button>
                                    <button type="button" class="anim-tab" data-anim-tab="out">Out</button>
                                    <button type="button" class="anim-tab" data-anim-tab="loop">Loop</button>
                                    <button type="button" class="anim-tab" data-anim-tab="zoom">Zoom</button>
                                </div>

                                <div id="animGridPanel" class="anim-grid"></div>

                                <div id="animZoomPanel" class="anim-zoom-panel hidden">
                                    <div class="anim-zoom-preview">
                                        <video id="animZoomPreview" muted playsinline preload="metadata"></video>
                                    </div>
                                    <div class="anim-depth-row">
                                        <button type="button" class="anim-card" data-zoom-depth="none">None</button>
                                        <button type="button" class="anim-card is-active" data-zoom-depth="shallow">Shallow</button>
                                        <button type="button" class="anim-card" data-zoom-depth="moderate">Moderate</button>
                                        <button type="button" class="anim-card" data-zoom-depth="deep">Deep</button>
                                    </div>
                                    <div class="anim-speed-row">
                                        <label for="animZoomSpeed">Speed</label>
                                        <input id="animZoomSpeed" type="range" min="0.4" max="3" step="0.1" value="1.2">
                                        <output id="animZoomSpeedVal">1.2s</output>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="convert-actions" style="margin-top:12px;">
                    <button id="trimRunBtn" type="button">Trim Video</button>
                    <button id="trimDownloadBtn" type="button" class="download-btn hidden">Download Trimmed Video</button>
                </div>
            </div>

            <p id="trimStatus" class="status" aria-live="polite">Load a video to start.</p>
        </section>
    </main>
    <div id="trimControlsToast" class="trim-toast" role="status" aria-live="polite"></div>

    <script src="tools-menu.js"></script>
    <script src="theme.js"></script>
    <script src="media-ffmpeg.js"></script>
    <script src="video-trimmer.js"></script>
</body>
</html>
