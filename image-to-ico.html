    <style>
    body:not(.dark-mode) .theme-switch { border-color:#9fc0e2; background:linear-gradient(180deg,var(--nav-pill-1) 0%,var(--nav-pill-2) 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.95), inset 0 -1px 0 rgba(116,158,205,.45), 0 2px 8px rgba(40,89,149,.16); }
    body:not(.dark-mode) .theme-track { background:#6f95c1; box-shadow:inset 0 1px 2px rgba(0,0,0,.2); }
    body:not(.dark-mode) .theme-thumb { background:linear-gradient(180deg,#fff 0%,#e8edf4 100%); }

<body>
<main class="app">
    <div class="headline-bar">
        <h1>Image to ICO</h1>
        <div class="tools-group">
            <button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme">
                <span class="theme-icon sun" aria-hidden="true">&#9728;</span>
                <span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span>
                <span class="theme-icon moon" aria-hidden="true">&#127769;</span>
            </button>
            <details class="tools-menu">
                <summary class="tools-menu-trigger">All Tools</summary>
                <div class="tools-menu-panel"></div>
            </details>
        </div>
    </div>
    
    <p class="subtitle">Create a true .ico file from PNG/JPG images.</p>
    
    <section class="card">
        <input id="icoFile" class="sr-only-input" type="file" accept="image/*">
        <div id="icoDrop" class="drop-zone" role="button" tabindex="0">
            <p class="drop-title">Drag and drop image here</p>
            <p class="drop-subtitle">or click to choose file</p>
        </div>
        
        <div class="convert-grid fixed-two-col" style="margin-top:12px;">
            <div>
                <label for="icoSize">Icon Size</label>
                <select id="icoSize">
                    <option value="16">16x16</option>
                    <option value="32">32x32</option>
                    <option value="48">48x48</option>
                    <option value="64">64x64</option>
                    <option value="128">128x128</option>
                    <option value="256" selected>256x256</option>
                </select>
            </div>
            <div>
                <p id="icoMeta" class="note" style="margin-top:28px;"></p>
            </div>
        </div>
        
        <div id="icoPreviewWrap" class="audio-preview hidden" style="margin-top:12px;">
            <img id="icoPreview" alt="ICO source preview">
        </div>
        
        <div class="convert-actions" style="margin-top:12px;">
            <button id="icoRunBtn" type="button">Convert to ICO</button>
            <button id="icoDownloadBtn" type="button" class="download-btn hidden">Download ICO</button>
        </div>
        
        <p id="icoStatus" class="status" aria-live="polite">Load an image to start.</p>
    </section>
</main>

<script src="tools-menu.js"></script>
<script src="theme.js"></script>
<script src="image-to-ico.js"></script>
