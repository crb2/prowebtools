    <main class="app">
        <div class="headline-bar">
            <h1>Aspect Ratio Calculator</h1>
            <div class="tools-group">

        <p class="subtitle">Fill any 3 values (W1, H1, W2, H2) and the 4th one is calculated automatically.</p>

        <section class="card">
            <div id="arUploadZone" class="ar-upload-zone" role="button" tabindex="0" aria-label="Upload preview image">

                <small>or click to choose image</small>

            <div class="ar-layout">
            <div class="ar-left">
            <div class="ar-eq-grid">
                <div class="ar-col">
                    <div>
                        <label for="arW1">W<sub>1</sub></label>
                        <div class="ar-stepper">
                            <input id="arW1" type="number" min="1" placeholder="e.g. 1920">
                            <div class="ar-spin">
                                <button type="button" data-step-target="arW1" data-step-dir="up" aria-label="Increase W1">&#9650;</button>
                                <button type="button" data-step-target="arW1" data-step-dir="down" aria-label="Decrease W1">&#9660;</button>
                            </div>
                        </div>
                    </div>
                    <div class="ar-divider" aria-hidden="true"></div>
                    <div>
                        <label for="arH1">H<sub>1</sub></label>
                        <div class="ar-stepper">
                            <input id="arH1" type="number" min="1" placeholder="e.g. 1080">
                            <div class="ar-spin">
                                <button type="button" data-step-target="arH1" data-step-dir="up" aria-label="Increase H1">&#9650;</button>
                                <button type="button" data-step-target="arH1" data-step-dir="down" aria-label="Decrease H1">&#9660;</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="ar-equals" aria-hidden="true">=</div>

                <div class="ar-col">
                    <div>
                        <label for="arW2">W<sub>2</sub></label>

                            <div class="ar-spin">
                                <button type="button" data-step-target="arW2" data-step-dir="up" aria-label="Increase W2">&#9650;</button>
                                <button type="button" data-step-target="arW2" data-step-dir="down" aria-label="Decrease W2">&#9660;</button>
                            </div>
                        </div>
                    </div>
                    <div class="ar-divider" aria-hidden="true"></div>
                    <div>
                        <label for="arH2">H<sub>2</sub></label>
                        <div class="ar-stepper">
                            <input id="arH2" type="number" min="1" placeholder="e.g. 720">
                            <div class="ar-spin">
                                <button type="button" data-step-target="arH2" data-step-dir="up" aria-label="Increase H2">&#9650;</button>
                                <button type="button" data-step-target="arH2" data-step-dir="down" aria-label="Decrease H2">&#9660;</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>

            <div class="ar-under">
            <div class="ar-panel">
                <div>
                    <label for="arPresetTrigger">Common ratios:</label>
                    <div class="ar-preset-select">
                        <button id="arPresetTrigger" class="ar-preset-trigger" type="button" aria-expanded="false">Select a ratio preset</button>
                        <div id="arPresetList" class="ar-preset-list" hidden></div>
                    </div>
                </div>

                <label class="ar-checkbox-row"><input id="arRound" type="checkbox" checked> Round results to the nearest whole number</label>
            </div>

            <p id="arStatus" class="status" aria-live="polite">Enter any 3 values to calculate the missing one.</p>

            <div class="ar-summary">
                <p id="arResult" class="note" style="margin:0;">Result: --</p>
                <p id="arSimple" class="ar-note" style="margin:8px 0 0;">Your aspect ratio is: --</p>
            </div>
            </div>

            <div class="ar-side">
            <div class="ar-checkbox-row ar-fit-toggle">
                <input id="arFitImage" type="checkbox">
                <label for="arFitImage" class="ar-inline-label">Strech to aspect ratio</label>
            </div>
            <div>
                <div class="ar-example-wrap">
                    <button id="arShowSample" class="ar-eye-toggle" type="button" aria-label="Toggle sample image" aria-pressed="false">
                        <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                            <path d="M9.9 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a16.4 16.4 0 0 1-4.1 4.8"></path>
                            <path d="M6.2 6.2A16.9 16.9 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4-.8"></path>
                        </svg>
                        <span class="sr-only">Toggle sample image</span>
                    </button>
                    <div id="arExampleBox" class="ar-example">
                        <span id="arExampleText">Example</span>
                        <div id="arSample" class="ar-sample" hidden>
                            <img
                                class="ar-sample-image"
                                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2400&q=100"
                                srcset="
                                    https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=100 1600w,
                                    https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2400&q=100 2400w,
                                    https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=3200&q=100 3200w,
                                    https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=4000&q=100 4000w
                                "
                                sizes="(max-width: 740px) 92vw, 460px"
                                alt="Ultra realistic nature landscape with mountains, forest, and lake"
                                loading="lazy"
                            >
                            <div class="ar-sample-caption">
                                <span id="arSampleRatio">16:9</span>
                                <span id="arSampleSize">1600 x 900</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="convert-actions">
                <button id="arSwap" type="button" class="download-btn">Swap Ratio Sides</button>
                <button id="arReset" type="button" class="download-btn">Reset</button>
            </div>
            </div>
            </div>
        </section>

    </main>

    <script src="../tools-menu.js"></script>
    <script src="../theme.js"></script>
    <script src="../aspect-ratio-calculator.js"></script>
</body>
</html>
