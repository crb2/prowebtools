    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator Online Free | Pro Web Tools</title>
    <meta name="description" content="Generate UUID v4 values in bulk and validate existing IDs.">
    <link rel="icon" type="image/svg+xml" href="../favicon-uuid-generator.svg">
    <link rel="stylesheet" href="../style-win7.css">
    <style>
        body:not(.dark-mode) .theme-switch { border-color:#9fc0e2; background:linear-gradient(180deg,var(--nav-pill-1) 0%,var(--nav-pill-2) 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(116,158,205,.45),0 2px 8px rgba(40,89,149,.16); }
        body:not(.dark-mode) .theme-track { background:#6f95c1; box-shadow:inset 0 1px 2px rgba(0,0,0,.2); }
        body:not(.dark-mode) .theme-thumb { background:linear-gradient(180deg,#fff 0%,#e8edf4 100%); }
        .uuid-out{min-height:220px;resize:vertical}
    </style>
</head>
<body>
<main class="app">
    <div class="headline-bar">
        <h1>UUID Generator</h1>
        <div class="tools-group">
            <button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme"><span class="theme-icon sun" aria-hidden="true">&#9728;</span><span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span><span class="theme-icon moon" aria-hidden="true">&#127769;</span></button>
            <details class="tools-menu"><summary class="tools-menu-trigger">All Tools</summary><div class="tools-menu-panel"></div></details>
        </div>
    </div>
    <p class="subtitle">Generate UUID v4 values with batch mode and quick validation.</p>
    <section class="card">
        <div class="convert-grid fixed-two-col">
            <div><label for="uuidCount">How Many</label><input id="uuidCount" type="number" min="1" max="500" value="10"></div>
            <div><label for="uuidValidate">Validate UUID</label><input id="uuidValidate" type="text" placeholder="Paste UUID to validate"></div>
        </div>
        <div class="convert-actions" style="margin-top:10px;">
            <button id="uuidGenerate" type="button">Generate</button>
            <button id="uuidCopy" type="button" class="download-btn">Copy All</button>
            <button id="uuidDownload" type="button" class="download-btn">Download TXT</button>
            <button id="uuidCheck" type="button" class="download-btn">Validate</button>
        </div>
        <p id="uuidStatus" class="status" aria-live="polite">Generate a UUID list.</p>
        <textarea id="uuidOut" class="uuid-out" readonly placeholder="UUID output"></textarea>
    </section>
</main>
<script src="../tools-menu.js"></script>
<script src="../theme.js"></script>
<script src="../uuid-generator.js"></script>
