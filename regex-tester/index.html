<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester Online Free | Pro Web Tools</title>
    <meta name="description" content="Test regular expressions live with flags, matches, and replace preview.">
    <link rel="icon" type="image/svg+xml" href="../favicon-regex-tester.svg">
    <link rel="stylesheet" href="../style-win7.css">
    <style>
        body:not(.dark-mode) .theme-switch { border-color:#9fc0e2; background:linear-gradient(180deg,var(--nav-pill-1) 0%,var(--nav-pill-2) 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(116,158,205,.45),0 2px 8px rgba(40,89,149,.16); }
        body:not(.dark-mode) .theme-track { background:#6f95c1; box-shadow:inset 0 1px 2px rgba(0,0,0,.2); }
        body:not(.dark-mode) .theme-thumb { background:linear-gradient(180deg,#fff 0%,#e8edf4 100%); }
        .rt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
        .rt-grid textarea{min-height:220px;resize:vertical}
        .rt-matchlist{margin-top:10px;max-height:180px;overflow:auto;border:1px solid #8fb3d8;border-radius:10px;padding:10px;background:rgba(255,255,255,.45)}
        @media (max-width:900px){.rt-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<main class="app">
    <div class="headline-bar">
        <h1>Regex Tester</h1>
        <div class="tools-group">
            <button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme"><span class="theme-icon sun" aria-hidden="true">&#9728;</span><span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span><span class="theme-icon moon" aria-hidden="true">&#127769;</span></button>
            <details class="tools-menu"><summary class="tools-menu-trigger">All Tools</summary><div class="tools-menu-panel"></div></details>
        </div>
    </div>
    <p class="subtitle">Try patterns quickly and inspect all matches with index positions.</p>
    <section class="card">
        <div class="convert-grid fixed-two-col">
            <div><label for="rtPattern">Pattern</label><input id="rtPattern" type="text" placeholder="\\b[a-zA-Z]{4}\\b"></div>
            <div><label for="rtFlags">Flags</label><input id="rtFlags" type="text" value="g" placeholder="gim"></div>
        </div>
        <div class="rt-grid">
            <div>
                <label for="rtInput">Test Text</label>
                <textarea id="rtInput" placeholder="Paste text here"></textarea>
            </div>
            <div>
                <label for="rtReplace">Replacement (optional)</label>
                <input id="rtReplace" type="text" placeholder="replace with this">
                <label for="rtOutput" style="margin-top:8px;">Replace Preview</label>
                <textarea id="rtOutput" readonly placeholder="Replacement preview"></textarea>
            </div>
        </div>
        <div class="convert-actions" style="margin-top:12px;">
            <button id="rtRun" type="button">Run Test</button>
            <button id="rtCopy" type="button" class="download-btn">Copy Replace Preview</button>
        </div>
        <p id="rtStatus" class="status" aria-live="polite">Enter a pattern and click Run Test.</p>
        <div id="rtMatches" class="rt-matchlist">No matches yet.</div>
    </section>
</main>
<script src="../tools-menu.js"></script>
<script src="../theme.js"></script>
<script src="../regex-tester.js"></script>
</body>
</html>
