<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compress PNG Online Free | Thumbnail Generator Tools</title>
<meta name="description" content="Compress PNG images by resizing and metadata-free re-encoding.">
<link rel="icon" type="image/svg+xml" href="favicon-compress-png.svg">
<link rel="stylesheet" href="style-win7.css">
<style>
body:not(.dark-mode) .theme-switch { border-color:#9fc0e2; background:linear-gradient(180deg,var(--nav-pill-1) 0%,var(--nav-pill-2) 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.95), inset 0 -1px 0 rgba(116,158,205,.45), 0 2px 8px rgba(40,89,149,.16); }
body:not(.dark-mode) .theme-track { background:#6f95c1; box-shadow:inset 0 1px 2px rgba(0,0,0,.2); }
body:not(.dark-mode) .theme-thumb { background:linear-gradient(180deg,#fff 0%,#e8edf4 100%); }
#cpngPreview { width:100%; max-height:300px; object-fit:contain; border:1px solid #8fb3d8; border-radius:10px; background:#eaf3ff; }
</style>
</head>
<body>
<main class="app">
<div class="headline-bar"><h1>Compress PNG</h1><div class="tools-group"><button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme"><span class="theme-icon sun" aria-hidden="true">&#9728;</span><span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span><span class="theme-icon moon" aria-hidden="true">&#127769;</span></button><details class="tools-menu"><summary class="tools-menu-trigger">All Tools</summary><div class="tools-menu-panel"></div></details></div></div>
<p class="subtitle">Reduce PNG size with scale optimization while preserving transparency.</p>
<section class="card">
<input id="cpngFile" class="sr-only-input" type="file" accept="image/png,image/*">
<div id="cpngDrop" class="drop-zone" role="button" tabindex="0"><p class="drop-title">Drag and drop image here</p><p class="drop-subtitle">or click to choose file</p></div>
<div style="margin-top:12px;"><label for="cpngScale">Scale: <span id="cpngScaleText">100%</span></label><input id="cpngScale" type="range" min="20" max="100" step="1" value="100"></div>
<div id="cpngPreviewWrap" class="audio-preview hidden" style="margin-top:12px;"><img id="cpngPreview" alt="PNG preview"></div>
<div class="convert-actions" style="margin-top:12px;"><button id="cpngRunBtn" type="button">Compress PNG</button><button id="cpngDownloadBtn" type="button" class="download-btn hidden">Download PNG</button></div>
<p id="cpngMeta" class="note"></p><p id="cpngStatus" class="status" aria-live="polite">Load an image to start.</p>
</section>
</main>
<script src="tools-menu.js"></script>
<script src="theme.js"></script>
<script src="compress-png.js"></script>
</body>
</html>
