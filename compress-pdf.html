<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF Online Free | Pro Web Tools</title>
    <meta name="description" content="Compress and optimize PDF files in browser to reduce file size for sharing.">
    <link rel="icon" type="image/svg+xml" href="favicon-compress-pdf.svg">
    <link rel="stylesheet" href="style-win7.css">
    <style>
        body:not(.dark-mode) .theme-switch {
            border-color: #9fc0e2;
            background: linear-gradient(180deg, var(--nav-pill-1) 0%, var(--nav-pill-2) 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.95), inset 0 -1px 0 rgba(116,158,205,.45), 0 2px 8px rgba(40,89,149,.16);
        }
        body:not(.dark-mode) .theme-track { background:#6f95c1; box-shadow: inset 0 1px 2px rgba(0,0,0,.2); }
        body:not(.dark-mode) .theme-thumb { background: linear-gradient(180deg,#fff 0%,#e8edf4 100%); }
        .pdf-preview-frame { width:100%; height:420px; border:1px solid #8fb3d8; border-radius:10px; background:#fff; }
    </style>
</head>
<body>
    <main class="app">
        <div class="headline-bar">
            <h1>Compress PDF</h1>
            <div class="tools-group">
                <button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme">
                    <span class="theme-icon sun" aria-hidden="true">&#9728;</span>
                    <span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span>
                    <span class="theme-icon moon" aria-hidden="true">&#127769;</span>
                </button>
                <details class="tools-menu">
                    <summary class="tools-menu-trigger">All Tools</summary>
                    <div class="tools-menu-panel"></div>
                </details>
            </div>
        </div>

        <p class="subtitle">Optimize PDF structure and object streams to reduce file size in-browser.</p>

        <section class="card">
            <input id="pdfFile" class="sr-only-input" type="file" accept="application/pdf,.pdf">
            <div id="pdfDrop" class="drop-zone" role="button" tabindex="0" aria-label="Load PDF by click or drag and drop">
                <p class="drop-title">Drag and drop PDF here</p>
                <p class="drop-subtitle">or click to choose file</p>
            </div>

            <div style="margin-top:12px;">
                <label for="pdfLevel">Compression Level: <span id="pdfLevelText">Medium</span></label>
                <input id="pdfLevel" type="range" min="1" max="3" step="1" value="2">
                <p id="pdfEstimate" class="note"></p>
            </div>

            <div class="convert-actions" style="margin-top:12px;">
                <button id="pdfRunBtn" type="button">Compress PDF</button>
                <button id="pdfDownloadBtn" type="button" class="download-btn hidden">Download Compressed PDF</button>
            </div>
            <p id="pdfMeta" class="note"></p>
            <p id="pdfStatus" class="status" aria-live="polite">Load a PDF to start.</p>

            <div id="pdfPreviewWrap" class="audio-preview hidden" style="margin-top:12px;">
                <h3 class="preview-title">Compressed Preview</h3>
                <iframe id="pdfPreview" class="pdf-preview-frame" title="Compressed PDF Preview"></iframe>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="tools-menu.js"></script>
    <script src="theme.js"></script>
    <script src="compress-pdf.js"></script>
</body>
</html>
