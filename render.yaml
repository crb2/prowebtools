services:
  - type: web
    name: prowebtools
    env: node
    plan: free
    buildCommand: npm ci && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ./yt-dlp && chmod +x ./yt-dlp
    startCommand: node server.js
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://prowebtools.in,https://www.prowebtools.in
      - key: YT_DLP_BIN
        value: /opt/render/project/src/yt-dlp
      - key: FORMAT_FETCH_BUDGET_MS
        value: "60000"
      - key: FORMAT_FETCH_ATTEMPT_TIMEOUT_MS
        value: "12000"
