        [data-theme="light"] .tvp-page .tvp-yt-avatar-top {
            border-color: #d3d3d3;
            background: #ffffff;
        }

        :root:not([data-theme="dark"]) .tvp-page .tvp-yt-chip,
        [data-theme="light"] .tvp-page .tvp-yt-chip {
            border-color: #e5e5e5;
            background: #f2f2f2;
            color: #0f0f0f;
        }

        :root:not([data-theme="dark"]) .tvp-page .tvp-yt-chip.is-active,
        [data-theme="light"] .tvp-page .tvp-yt-chip.is-active {
            border-color: #0f0f0f;
            background: #0f0f0f;
            color: #ffffff;
        }

        :root:not([data-theme="dark"]) .tvp-page .tvp-yt-nav-item.is-active,
        [data-theme="light"] .tvp-page .tvp-yt-nav-item.is-active {
            color: #0f0f0f;
        }

        :root:not([data-theme="dark"]) .tvp-page .tvp-yt-shorts-icon,
        [data-theme="light"] .tvp-page .tvp-yt-shorts-icon {
            filter: brightness(0) saturate(100%);
        }

        .tvp-page .tvp-remember-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #dce8ff;
            user-select: text;
            white-space: normal;
            flex: 0 0 auto;
        }

        .tvp-page .tools-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .tvp-page .headline-with-brand {
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-areas:
                "brand remember"
                "title tools";
            column-gap: 14px;
            row-gap: 2px;
            align-items: start;
        }

        .tvp-page .headline-with-brand .tvp-remember-wrap {
            grid-area: remember;
            justify-self: end;
            align-self: end;
            margin: 0;
        }

        .tvp-page .headline-with-brand .tools-group {
            grid-area: tools;
            justify-self: end;
            align-self: center;
            margin-top: 0;
        }

        .tvp-page .site-tool-title {
            margin-top: 0;
            margin-bottom: 0;
            line-height: 1.16;
        }

        .tvp-page .subtitle {
            margin-top: 8px;
        }

        .tvp-page .tvp-tools-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tvp-page .tvp-remember-wrap input {
            width: 14px;
            height: 14px;
            margin: 0;
            accent-color: #4f95e4;
        }

        :root:not([data-theme="dark"]) .tvp-page .tvp-remember-wrap,
        [data-theme="light"] .tvp-page .tvp-remember-wrap,
        body:not(.dark-mode) .tvp-page .tvp-remember-wrap {
            color: #174472;
        }

        [data-theme="dark"] .tvp-page .tvp-remember-wrap {
            color: #dce8ff;
        }

        @media (max-width: 900px) {
            .tvp-page .tools-group {
                align-items: flex-start;
            }

            .tvp-page .tvp-remember-wrap span {
                display: inline;
            }
        }

        @media (max-width: 700px) {
            .tvp-page .headline-with-brand {
                grid-template-areas:
                    "brand remember"
                    "title tools";
                row-gap: 6px;
            }

            .tvp-page .headline-with-brand .tools-group {
                justify-self: end;
            }
        }
    </style>
</head>
<body class="tvp-page">
    <main class="app">
        <div class="headline-bar headline-with-brand">
            <h1>YouTube Thumbnail Device Preview</h1>
            <label class="tvp-remember-wrap" for="tvpRememberProfile" title="Remember channel name and profile logo on this browser">
                <input id="tvpRememberProfile" type="checkbox">
                <span>Remember channel name and logo</span>
            </label>
            <div class="tools-group">
                <div class="tvp-tools-row">
                    <button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme">
                        <span class="theme-icon sun" aria-hidden="true">&#9728;</span>
                        <span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span>
                        <span class="theme-icon moon" aria-hidden="true">&#127769;</span>
                    </button>
                    <details class="tools-menu">
                        <summary class="tools-menu-trigger">All Tools</summary>
                        <div class="tools-menu-panel"></div>
                    </details>
                </div>
            </div>
        </div>
        <p class="subtitle">Build and compare thumbnail concepts with a studio-style preview workspace for YouTube and size-based placements.</p>

        <section class="tvp-workspace">
            <input id="tvpFileInput" class="sr-only-input" type="file" accept="image/*" multiple>
            <input id="tvpLogoInput" class="sr-only-input" type="file" accept="image/*">
            <div class="tvp-layout" style="display: grid;">
            <aside class="tvp-sidebar">
                <div class="tvp-sidebar-top">
                    <button type="button" class="tvp-back-btn" aria-label="Back">&#8249;</button>
                </div>

                <div class="tvp-segment tvp-view-toggle" role="tablist" aria-label="Preview mode">
                    <button id="tvpViewYoutube" type="button" class="is-active" role="tab" aria-selected="true">YouTube View</button>
                    <button id="tvpViewSize" type="button" role="tab" aria-selected="false">Size View</button>
                </div>

                <div class="tvp-segment tvp-layout-toggle" role="tablist" aria-label="Layout mode">
                    <button type="button" data-layout="desktop" class="is-active" title="Desktop layout">&#128187;</button>
                    <button type="button" data-layout="search" title="Search layout">&#128269;</button>
                    <button type="button" data-layout="sidebar" title="Sidebar layout">&#128307;</button>
                    <button type="button" data-layout="mobile" title="Mobile layout">&#128241;</button>
                </div>

                <div class="tvp-grid-actions">
                    <button id="tvpShuffleBtn" type="button">&#128256; Shuffle</button>
                    <button id="tvpResetBtn" type="button">&#8635; Reset</button>
                    <button id="tvpRandomThumbBtn" type="button" title="Random active thumbnail">&#9638;</button>
                </div>

                <div class="tvp-field-group">
                    <label for="tvpVideoTitle">Video Title</label>
                    <input id="tvpVideoTitle" type="text" maxlength="120" placeholder="Add a title in sidebar">
                </div>

                <div class="tvp-field-group">
                    <label for="tvpChannelName">Channel Name</label>
                    <input id="tvpChannelName" type="text" maxlength="80" placeholder="Channel Name">
                    <div class="tvp-logo-upload-row">
                        <button id="tvpLogoUploadBtn" class="tvp-logo-btn" type="button">Upload Channel Logo</button>
                        <img id="tvpLogoPreview" class="tvp-logo-preview is-empty" alt="Channel logo preview">
                    </div>
                </div>

                <div class="tvp-thumbs-head">
                    <h2>Thumbnails</h2>
                    <span id="tvpThumbCount" class="tvp-count">0</span>
                </div>

                <div id="tvpThumbList" class="tvp-thumb-list"></div>
            </aside>

            <section class="tvp-canvas-wrap">
                <header class="tvp-canvas-header">
                    <div class="tvp-canvas-left">&#9776; &nbsp; &#11041;</div>
                    <div class="tvp-canvas-search">Search YouTube...</div>
                    <div class="tvp-canvas-right">&#128276; &nbsp; &#9711;</div>
                </header>
                <div class="tvp-preview-stack">
                    <details id="tvpDesktopPanel" class="tvp-preview-panel" open>
                        <summary>Desktop Preview</summary>
                        <div id="tvpDesktopCanvas" class="tvp-canvas"></div>
                    </details>
                    <details id="tvpMobilePanel" class="tvp-preview-panel">
                        <summary>Mobile Preview</summary>
                        <div id="tvpMobileCanvas" class="tvp-canvas"></div>
                    </details>
                    <div id="tvpCanvas" class="tvp-canvas" hidden></div>
                </div>
                <p id="tvpStatus" class="status" aria-live="polite"></p>
            </section>
            </div>
        </section>
    </main>

    <script src="../tools-menu.js"></script>
    <script src="../theme.js"></script>
    <script src="../preview.js"></script>
</body>
</html>
