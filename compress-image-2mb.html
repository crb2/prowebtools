<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compress Image to 2MB Online Free | Thumbnail Generator Tools</title>
<meta name="description" content="Auto compress image size to 2MB or less for upload limits.">
<link rel="icon" type="image/svg+xml" href="favicon-compress-image-2mb.svg"><link rel="stylesheet" href="style-win7.css">
    <style>
        body:not(.dark-mode) .theme-switch {
            border-color: #9fc0e2;
            background: linear-gradient(180deg, var(--nav-pill-1) 0%, var(--nav-pill-2) 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -1px 0 rgba(116, 158, 205, 0.45),
                0 2px 8px rgba(40, 89, 149, 0.16);
        }
        body:not(.dark-mode) .theme-track {
            background: #6f95c1;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        body:not(.dark-mode) .theme-thumb {
            background: linear-gradient(180deg, #ffffff 0%, #e8edf4 100%);
        }
    </style>
</head><body><main class="app">
<div class="headline-bar"><h1>Compress Image to 2MB</h1><div class="tools-group"><button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme"><span class="theme-icon sun">&#9728;</span><span class="theme-track"><span class="theme-thumb"></span></span><span class="theme-icon moon">&#127769;</span></button><details class="tools-menu"><summary class="tools-menu-trigger">All Tools</summary><div class="tools-menu-panel"></div></details></div></div>
<p class="subtitle">Automatically adjust quality/scale to keep output under 2MB.</p>
<section class="card">
<input id="c2File" class="sr-only-input" type="file" accept="image/*"><div id="c2Drop" class="drop-zone" role="button" tabindex="0"><p class="drop-title">Drag and drop image here</p><p class="drop-subtitle">or click to select file</p></div>
<div class="convert-grid fixed-two-col" style="margin-top:12px;"><div><label for="c2Format">Output Format</label><select id="c2Format"><option value="image/jpeg" selected>JPG</option><option value="image/webp">WEBP</option><option value="image/png">PNG</option></select></div><div><p id="c2Meta" class="note" style="margin-top:28px;"></p></div></div>
<div class="convert-actions" style="margin-top:12px;"><button id="c2RunBtn" type="button">Compress to 2MB</button><button id="c2DownloadBtn" type="button" class="download-btn hidden">Download Image</button></div>
<p id="c2Status" class="status" aria-live="polite">Load image to start.</p>
</section>
</main>
<script src="tools-menu.js"></script><script src="theme.js"></script><script src="compress-image-2mb.js"></script>
</body></html>
