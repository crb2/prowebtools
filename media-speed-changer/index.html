<main class="app">
<div class="headline-bar"><h1>Media Speed Changer</h1><div class="tools-group"><button type="button" class="theme-switch" data-theme-toggle aria-label="Toggle theme"><span class="theme-icon sun" aria-hidden="true">&#9728;</span><span class="theme-track" aria-hidden="true"><span class="theme-thumb"></span></span><span class="theme-icon moon" aria-hidden="true">&#127769;</span></button><details class="tools-menu"><summary class="tools-menu-trigger">All Tools</summary><div class="tools-menu-panel"></div></details></div></div>
